version: '3'
services:
  app:
    image: harbor.node8.xyz/wenfeng/hyperf-energy-bot:latest
    container_name: ext-telegram
    volumes:
      - ./:/data/project
    environment:
      - APP_ENV=dev
      - SCAN_CACHEABLE=false
    working_dir: /data/project
    stdin_open: true
    tty: true
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    container_name: ext_tg_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ext-telegram
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: ext_tg_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data: